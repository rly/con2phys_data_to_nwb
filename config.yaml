# Experiment metadata for NWB conversion.
# Update placeholder values before running the conversion.

# TODO: Update experiment_description with the actual experiment description.
experiment_description: "Neuropixels recordings from 3 brain areas during a behavioral task"
# TODO: Update experimenter with the actual experimenter name(s) in "LastName, FirstName" format.
experimenter:
  - "Unknown, Experimenter"
# TODO: Update institution with the actual institution.
institution: "Unknown"
# TODO: Update lab with the actual lab.
lab: "Unknown"
keywords:
  - "electrophysiology"
  - "Neuropixels"
  - "local field potential"
  - "single-unit activity"
  - "con2phys"
  - "reproducibility"

# Default subject metadata. Can be overridden per session.
subject:
  species: "Mus musculus"
  sex: "U"  # "M", "F", or "U" for unknown
  # TODO: Update age with the actual age in ISO 8601 duration format.
  age: "P1M/"  # ISO 8601 duration, e.g. "P90D" for 90 days. "P1M/" means 1 month or older (unknown).
  # TODO: Update description with the actual subject description.
  description: "Mouse used in con2phys dataset"

# TODO: Update session_start_time with the actual recording date.
# Use ISO 8601 format with timezone, e.g. "1970-01-15T09:00:00+01:00".
session_start_time: "1970-01-01T00:00:00+00:00"

# Per-session overrides. Keys are mouse IDs (1-18).
# Any field set here takes precedence over the top-level default.
# TODO: Update session descriptions with actual descriptions.
